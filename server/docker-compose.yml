services:
  now-postgres:
    image: postgres:16-alpine
    container_name: now-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: now
      POSTGRES_USER: now
      POSTGRES_PASSWORD: ${NOW_POSTGRES_PASSWORD:-now-local-password}
    volumes:
      - now_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U now -d now"]
      interval: 10s
      timeout: 5s
      retries: 5

  now-api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: now-api
    restart: unless-stopped
    depends_on:
      now-postgres:
        condition: service_healthy
    environment:
      NOW_DATABASE_URL: postgresql+psycopg://now:${NOW_POSTGRES_PASSWORD:-now-local-password}@now-postgres:5432/now
      NOW_STORAGE_DIR: ${NOW_STORAGE_DIR:-/data/recordings}
      NOW_MESSENGER_STORAGE_DIR: ${NOW_MESSENGER_STORAGE_DIR:-/data/messenger}
      NOW_MESSENGER_MAX_UPLOAD_MB: ${NOW_MESSENGER_MAX_UPLOAD_MB:-10}
      NOW_MESSENGER_ALLOWED_EXTENSIONS: ${NOW_MESSENGER_ALLOWED_EXTENSIONS:-jpg,jpeg,png,webp,gif,pdf,txt,md,docx,xlsx,pptx,zip}
      NOW_MESSENGER_ALLOWED_MIME_TYPES: ${NOW_MESSENGER_ALLOWED_MIME_TYPES:-image/jpeg,image/png,image/webp,image/gif,application/pdf,text/plain,text/markdown,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/zip}
      NOW_SERVER_NAME: ${NOW_SERVER_NAME:-NowNote Local Server}
      # Set this before public operation. If empty, local server APIs are open.
      NOW_API_TOKEN: ${NOW_API_TOKEN:-}
      NOW_USER_TOKEN_REQUIRED: ${NOW_USER_TOKEN_REQUIRED:-false}
      NOW_PUBLIC_BASE_URL: ${NOW_PUBLIC_BASE_URL:-}
      NOW_BEHIND_REVERSE_PROXY: ${NOW_BEHIND_REVERSE_PROXY:-false}
      NOW_SELF_REGISTRATION_ENABLED: ${NOW_SELF_REGISTRATION_ENABLED:-true}
      NOW_SELF_ACCOUNT_DELETE_ENABLED: ${NOW_SELF_ACCOUNT_DELETE_ENABLED:-true}
      NOW_SMTP_HOST: ${NOW_SMTP_HOST:-}
      NOW_SMTP_PORT: ${NOW_SMTP_PORT:-587}
      NOW_SMTP_USERNAME: ${NOW_SMTP_USERNAME:-}
      NOW_SMTP_PASSWORD: ${NOW_SMTP_PASSWORD:-}
      NOW_SMTP_FROM: ${NOW_SMTP_FROM:-}
      NOW_SMTP_USE_TLS: ${NOW_SMTP_USE_TLS:-true}
      NOW_PASSWORD_RESET_CODE_MINUTES: ${NOW_PASSWORD_RESET_CODE_MINUTES:-30}
      NOW_LLM_PROVIDER: ${NOW_LLM_PROVIDER:-local}
      NOW_OPENAI_API_KEY: ${NOW_OPENAI_API_KEY:-}
      NOW_OPENAI_BASE_URL: ${NOW_OPENAI_BASE_URL:-https://api.openai.com/v1}
      NOW_OPENAI_MODEL: ${NOW_OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - now_recording_data:${NOW_STORAGE_DIR:-/data/recordings}
      - now_messenger_data:${NOW_MESSENGER_STORAGE_DIR:-/data/messenger}
    ports:
      - "8750:8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  now-worker:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: now-worker
    restart: unless-stopped
    depends_on:
      now-postgres:
        condition: service_healthy
    environment:
      NOW_DATABASE_URL: postgresql+psycopg://now:${NOW_POSTGRES_PASSWORD:-now-local-password}@now-postgres:5432/now
      NOW_STORAGE_DIR: ${NOW_STORAGE_DIR:-/data/recordings}
      NOW_SERVER_NAME: ${NOW_SERVER_NAME:-NowNote Local Server}
      NOW_API_TOKEN: ${NOW_API_TOKEN:-}
      NOW_USER_TOKEN_REQUIRED: ${NOW_USER_TOKEN_REQUIRED:-false}
      NOW_PUBLIC_BASE_URL: ${NOW_PUBLIC_BASE_URL:-}
      NOW_BEHIND_REVERSE_PROXY: ${NOW_BEHIND_REVERSE_PROXY:-false}
      NOW_SELF_REGISTRATION_ENABLED: ${NOW_SELF_REGISTRATION_ENABLED:-true}
      NOW_SELF_ACCOUNT_DELETE_ENABLED: ${NOW_SELF_ACCOUNT_DELETE_ENABLED:-true}
      NOW_SMTP_HOST: ${NOW_SMTP_HOST:-}
      NOW_SMTP_PORT: ${NOW_SMTP_PORT:-587}
      NOW_SMTP_USERNAME: ${NOW_SMTP_USERNAME:-}
      NOW_SMTP_PASSWORD: ${NOW_SMTP_PASSWORD:-}
      NOW_SMTP_FROM: ${NOW_SMTP_FROM:-}
      NOW_SMTP_USE_TLS: ${NOW_SMTP_USE_TLS:-true}
      NOW_PASSWORD_RESET_CODE_MINUTES: ${NOW_PASSWORD_RESET_CODE_MINUTES:-30}
      NOW_WORKER_POLL_SECONDS: ${NOW_WORKER_POLL_SECONDS:-5}
      NOW_WORKER_BATCH_SIZE: ${NOW_WORKER_BATCH_SIZE:-5}
      NOW_LLM_PROVIDER: ${NOW_LLM_PROVIDER:-local}
      NOW_OPENAI_API_KEY: ${NOW_OPENAI_API_KEY:-}
      NOW_OPENAI_BASE_URL: ${NOW_OPENAI_BASE_URL:-https://api.openai.com/v1}
      NOW_OPENAI_MODEL: ${NOW_OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - now_recording_data:${NOW_STORAGE_DIR:-/data/recordings}
    command: ["python", "-m", "app.worker"]

volumes:
  now_postgres_data:
  now_recording_data:
  now_messenger_data:
