name: NowNote Preflight

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  preflight:
    name: Server preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax
        working-directory: server
        run: python -m py_compile scripts/preflight.py scripts/smoke_test.py ../web/scripts/verify_web_surface.py

      - name: Run repository preflight
        working-directory: server
        run: python scripts/preflight.py --env-file .env.example --allow-example

      - name: Run web surface verification
        working-directory: web
        run: python scripts/verify_web_surface.py
