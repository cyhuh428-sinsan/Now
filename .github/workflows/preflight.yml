name: NowNote Preflight

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  preflight:
    name: Server preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Python syntax
        working-directory: server
        run: python -m py_compile scripts/preflight.py scripts/smoke_test.py app/db.py app/models/note.py app/api/admin.py app/api/monitor.py app/api/public_pages.py app/services/open_source_release.py app/services/public_route.py app/services/release_evidence.py ../web/scripts/verify_web_surface.py ../now_app/scripts/verify_mobile_surface.py ../now_app/scripts/check_android_runtime.py ../now_app/scripts/check_android_emulator.py ../now_app/scripts/check_android_launch.py ../scripts/verify_public_repo_safety.py ../scripts/check_github_actions_status.py ../scripts/dispatch_github_actions.py ../scripts/local_environment_status.py ../scripts/play_release_status.py ../scripts/release_readiness.py

      - name: Check deploy helper syntax
        run: sh -n server/scripts/deploy_local.sh

      - name: Check web runtime script syntax
        run: node --check web/scripts/check_import_export.mjs

      - name: Run repository preflight
        working-directory: server
        run: python scripts/preflight.py --env-file .env.example --allow-example

      - name: Run public repository safety verification
        run: python scripts/verify_public_repo_safety.py

      - name: Run web surface verification
        working-directory: web
        run: python scripts/verify_web_surface.py

      - name: Run mobile surface verification
        working-directory: now_app
        run: python scripts/verify_mobile_surface.py
