name: NowNote Release Assets

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-assets:
    name: Build and upload release assets
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Windows installer
        working-directory: desktop
        run: npm run dist:win

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install mobile dependencies
        working-directory: now_app
        run: flutter pub get

      - name: Build Android APK
        working-directory: now_app
        run: flutter build apk --release

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "desktop/dist/NowNote-Setup-*-x64.exe" "release-assets/NowNote-Setup-${{ steps.version.outputs.version }}-x64.exe"
          Copy-Item "now_app/build/app/outputs/flutter-apk/app-release.apk" "release-assets/NowNote-${{ steps.version.outputs.version }}.apk"
          Get-ChildItem release-assets

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NowNote ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release-assets/NowNote-Setup-${{ steps.version.outputs.version }}-x64.exe
            release-assets/NowNote-${{ steps.version.outputs.version }}.apk
